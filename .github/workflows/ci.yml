name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    uses: agentjido/github-actions/.github/workflows/elixir-lint.yml@main
    with:
      otp_version: "28"
      elixir_version: "1.19"

  test:
    name: Test
    uses: agentjido/github-actions/.github/workflows/elixir-test.yml@main
    with:
      otp_versions: '["27", "28"]'
      elixir_versions: '["1.18", "1.19"]'
      test_command: mix test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"

      - name: Cache deps and build
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-coveralls-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-coveralls-

      - name: Install dependencies
        run: mix deps.get

      - name: Run coverage and enforce threshold
        run: |
          set -euo pipefail
          output="$(mix coveralls)"
          printf '%s\n' "$output"

          total="$(printf '%s\n' "$output" | awk '/^\[TOTAL\]/ {gsub("%", "", $2); print $2}')"
          threshold="90"

          if [ -z "$total" ]; then
            echo "Failed to parse total coverage from ExCoveralls output."
            exit 1
          fi

          if ! awk -v total="$total" -v threshold="$threshold" 'BEGIN { exit !(total + 0 >= threshold + 0) }'; then
            echo "Coverage ${total}% is below required threshold ${threshold}%."
            exit 1
          fi

          echo "Coverage ${total}% meets threshold ${threshold}%."
