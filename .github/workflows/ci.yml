name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    uses: agentjido/github-actions/.github/workflows/elixir-lint.yml@v3
    with:
      otp_version: "28"
      elixir_version: "1.19"

  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        otp: ["27", "28"]
        elixir: ["1.18", "1.19"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout Bedrock main
        uses: actions/checkout@v5
        with:
          repository: bedrock-kv/bedrock
          ref: main
          path: bedrock

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Cache deps and build
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-test-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-test-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Install dependencies
        run: mix deps.get
        env:
          BEDROCK_PATH: ${{ github.workspace }}/bedrock

      - name: Run tests
        run: mix test
        env:
          BEDROCK_PATH: ${{ github.workspace }}/bedrock

  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"

      - name: Cache deps and build
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-coveralls-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-coveralls-

      - name: Checkout Bedrock main
        uses: actions/checkout@v5
        with:
          repository: bedrock-kv/bedrock
          ref: main
          path: bedrock

      - name: Install dependencies
        run: mix deps.get
        env:
          BEDROCK_PATH: ${{ github.workspace }}/bedrock

      - name: Run coverage and enforce threshold
        run: |
          set -euo pipefail
          output="$(mix coveralls)"
          printf '%s\n' "$output"

          total="$(printf '%s\n' "$output" | awk '/^\[TOTAL\]/ {gsub("%", "", $2); print $2}')"
          threshold="90"

          if [ -z "$total" ]; then
            echo "Failed to parse total coverage from ExCoveralls output."
            exit 1
          fi

          if ! awk -v total="$total" -v threshold="$threshold" 'BEGIN { exit !(total + 0 >= threshold + 0) }'; then
            echo "Coverage ${total}% is below required threshold ${threshold}%."
            exit 1
          fi

          echo "Coverage ${total}% meets threshold ${threshold}%."
        env:
          BEDROCK_PATH: ${{ github.workspace }}/bedrock
